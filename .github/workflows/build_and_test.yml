name: Build and Test

on:
  push:
    branches: [practice_3]
  pull_request:
    branches: [practice_3]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: practice_3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make debhelper dpkg-dev libgtest-dev

      - name: Build project
        run: |
          make all

      - name: Create .deb package
        run: |
          make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fibonacci_deb_package
          path: fibonacci.deb

      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: test_fibonacci
          path: usr/test_fibonacci

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: practice_3

      - name: Download artifacts
        uses: actions/download-artifact@v2
        with:
          name: fibonacci_deb_package
          path: .

      - name: Download test binary
        uses: actions/download-artifact@v2
        with:
          name: test_fibonacci
          path: .

      - name: Build Docker image
        run: |
          docker build -t fibonacci-app .

      - name: Run Docker container
        env:
          INPUT_PARAM: 10
        run: |
          docker run --rm -e INPUT_PARAM=$INPUT_PARAM -v ${{ github.workspace }}:/app fibonacci-app
